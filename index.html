<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vall Pádel - Gestión Diaria</title>
    <style>
        :root {
            --verde-padel: #2ecc71;
            --verde-oscuro: #27ae60;
            --fondo: #f8f9fa;
            --texto: #2c3e50;
            --blanco: #ffffff;
        }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--fondo); 
            color: var(--texto);
            margin: 0; 
            padding: 10px; 
        }
        .container { 
            max-width: 600px; 
            margin: 20px auto; 
            background: var(--blanco); 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        h1, h2 { text-align: center; color: var(--verde-oscuro); }
        .section { margin-bottom: 40px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box;
            font-size: 16px;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--verde-padel); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: var(--verde-oscuro); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f1f8f4; color: var(--verde-oscuro); }
        .refresh-btn { 
            background: #3498db; 
            margin-bottom: 10px; 
            font-size: 14px; 
            padding: 10px; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Vall Pádel 🎾</h1>

        <!-- SECCIÓN 1: REGISTRO DE PAGO -->
        <div class="section">
            <h2>💰 Registro de Pago</h2>
            <form id="formPago">
                <div class="form-group">
                    <label>Instructor</label>
                    <select id="ins_pago" required>
                        <option value="">-- Selecciona --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Estudiante</label>
                    <select id="estudiante_pago" required>
                        <option value="">Selecciona instructor primero...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Monto (€)</label>
                    <input type="number" id="monto" placeholder="Ej: 20" required>
                </div>
                <button type="submit">Registrar Pago</button>
            </form>
        </div>

        <!-- SECCIÓN 2: OCUPACIÓN DE PISTAS -->
        <div class="section">
            <h2>📅 Ocupación de Pistas</h2>
            <form id="formOcupacion">
                <div class="form-group">
                    <label>Pista</label>
                    <select id="pista_num" required>
                        <option value="1">Pista 1</option>
                        <option value="2">Pista 2</option>
                        <option value="3">Pista 3</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nombre Grupo / Alumno</label>
                    <input type="text" id="nombre_grupo" placeholder="Ej: Grupo Tarde" required>
                </div>
                <div class="form-group">
                    <label>Día</label>
                    <select id="dia_semana" required>
                        <option value="Lunes">Lunes</option>
                        <option value="Martes">Martes</option>
                        <option value="Miércoles">Miércoles</option>
                        <option value="Jueves">Jueves</option>
                        <option value="Viernes">Viernes</option>
                        <option value="Sábado">Sábado</option>
                        <option value="Domingo">Domingo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Hora Inicio</label>
                    <input type="time" id="hora_inicio" required>
                </div>
                <div class="form-group">
                    <label>Duración</label>
                    <select id="duracion_clase">
                        <option value="1h">1 hora</option>
                        <option value="1.5h">1.5 horas</option>
                        <option value="2h">2 horas</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Instructor</label>
                    <select id="ins_ocupacion" required></select>
                </div>
                <button type="submit">Registrar</button>
            </form>
        </div>

        <!-- SECCIÓN 3: CALENDARIO -->
        <div class="section">
            <h2>👀 Próximas Clases</h2>
            <button class="refresh-btn" onclick="cargarCalendario()">🔄 Actualizar Calendario</button>
            <table>
                <thead>
                    <tr>
                        <th>Pista</th>
                        <th>Horario</th>
                        <th>Grupo</th>
                    </tr>
                </thead>
                <tbody id="cuerpoCalendario">
                    <!-- Datos dinámicos -->
                </tbody>
            </table>
        </div>
    </div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbyniiYvvur4aH3lfHkIiFIV7PD1QOKfrCvmjA0sLSLLtjxZ61GDMGgtMc8MLFOZQVQY/exec";
    const NOMBRES_INSTRUCTORES = ["Dani", "Vicen", "Laura", "Nacho"];
    let baseDatosAlumnos = [];

    window.onload = async function() {
        llenarInstructores();
        await cargarBaseAlumnos();
        await cargarCalendario();
    };

    function llenarInstructores() {
        const selects = [document.getElementById('ins_pago'), document.getElementById('ins_ocupacion')];
        selects.forEach(select => {
            select.innerHTML = '<option value="">-- Selecciona --</option>';
            NOMBRES_INSTRUCTORES.forEach(nombre => {
                let opt = document.createElement('option');
                opt.value = nombre; 
                opt.text = nombre;
                select.appendChild(opt);
            });
        });
    }

    async function cargarBaseAlumnos() {
        try {
            const res = await fetch(URL_API + "?obtener=alumnos");
            const datos = await res.json();
            baseDatosAlumnos = datos.slice(1);
            console.log("Alumnos cargados:", baseDatosAlumnos.length);
        } catch (e) { 
            console.error("Error cargando alumnos", e); 
        }
    }

    // Filtro de alumnos corregido con .trim() para evitar errores de espacios
    document.getElementById('ins_pago').addEventListener('change', function() {
        const insSeleccionado = this.value.trim();
        const selectEst = document.getElementById('estudiante_pago');
        
        selectEst.innerHTML = '<option value="">Selecciona estudiante...</option>';
        
        baseDatosAlumnos.forEach(fila => {
            // fila[0] es Instructor, fila[1] es Alumno en tu Google Sheets
            if (fila[0] && fila[0].toString().trim() === insSeleccionado) {
                let opt = document.createElement('option');
                opt.value = fila[1]; 
                opt.text = fila[1];
                selectEst.appendChild(opt);
            }
        });
    });

    async function enviarDatos(datos) {
        try {
            await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
            alert("✅ Registrado con éxito");
            return true;
        } catch (e) { 
            alert("❌ Error de envío"); 
            return false; 
        }
    }

    document.getElementById('formPago').addEventListener('submit', async (e) => {
        e.preventDefault();
        const info = {
            tipo: "Pagos",
            instructor: document.getElementById('ins_pago').value,
            estudiante: document.getElementById('estudiante_pago').value,
            monto: document.getElementById('monto').value
        };
        if (await enviarDatos(info)) e.target.reset();
    });

    document.getElementById('formOcupacion').addEventListener('submit', async (e) => {
        e.preventDefault();
        const info = {
            tipo: "Ocupacion",
            pista: document.getElementById('pista_num').value,
            group: document.getElementById('nombre_grupo').value,
            horario: `${document.getElementById('dia_semana').value} | ${document.getElementById('hora_inicio').value} (${document.getElementById('duracion_clase').value})`,
            instructor: document.getElementById('ins_ocupacion').value
        };
        if (await enviarDatos(info)) {
            e.target.reset();
            setTimeout(cargarCalendario, 2000);
        }
    });

    async function cargarCalendario() {
        const cuerpo = document.getElementById('cuerpoCalendario');
        cuerpo.innerHTML = "<tr><td colspan='3'>Cargando...</td></tr>";
        try {
            const res = await fetch(URL_API + "?t=" + new Date().getTime());
            const datos = await res.json();
            cuerpo.innerHTML = "";
            datos.forEach(fila => {
                // Filtramos filas que tengan datos de pista para no llenar de vacíos
                if (fila[1] && fila[1] !== "" && fila[1] !== "Pista") {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${fila[1]}</td><td>${fila[3] || ""}</td><td><strong>${fila[2] || ""}</strong></td>`;
                    cuerpo.appendChild(tr);
                }
            });
        } catch (e) { 
            cuerpo.innerHTML = "<tr><td colspan='3'>Error al cargar el calendario</td></tr>"; 
        }
    }
</script> 
</body>
</html>
